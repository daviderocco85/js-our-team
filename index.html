<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--Google Fonts-->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!--CSS-->
    <link rel="stylesheet" href="assets/css/style.css">

    <title>Our Team</title>
</head>

<body>

    <div class="container py-5">

        <!-- TITLE -->
        <div class="text-center mb-5">
            <h1>Meet our Team</h1>
            <p class="mt-5">
                Dietro ogni progetto c'è un team di professionisti appassionati e talentuosi,
                pronti a trasformare le idee in realtà, dedicato a creare esperienze su misura
                per ogni cliente. Unisciti a noi, insieme costruiamo il futuro!
            </p>
        </div>

        <!-- GRID -->
        <div class="row g-4 mt-5">
            <!-- Team cards will be injected here by JavaScript -->


        </div>
        <!-- FORM: ADD NEW MEMBER -->
        <div class="row mt-5">
            <div class="col-12 col-md-8 mx-auto">

                <h2 class="text-center mb-4">Compila il form e unisciti al nostro team</h2>

                <form id="addMemberForm" class="p-4 border rounded bg-light">

                    <!-- NAME -->
                    <div class="mb-3">
                        <label for="memberName" class="form-label fw-semibold">Nome</label>
                        <input type="text" class="form-control" id="memberName" placeholder="Inserisci il tuo nome"
                            pattern="[A-Za-zÀ-ÿ\s']+" title="Inserisci solo lettere" required>
                    </div>

                    <!-- ROLE -->
                    <div class="mb-3">
                        <label for="memberRole" class="form-label fw-semibold">Ruolo</label>
                        <input type="text" class="form-control" id="memberRole" placeholder="Inserisci il tuo ruolo"
                            pattern="[A-Za-zÀ-ÿ\s'-]+" title="Inserisci solo lettere" required>
                    </div>

                    <!-- EMAIL -->
                    <div class="mb-3">
                        <label for="memberEmail" class="form-label fw-semibold">Email</label>
                        <input type="email" class="form-control" id="memberEmail" placeholder="nome@team.com"
                            pattern="^[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.[A-Za-z]{2,}$"
                            title="Inserisci un indirizzo email valido" required>
                    </div>

                    <!-- IMAGE -->
                    <div class="mb-3">
                        <label for="memberImage" class="form-label fw-semibold">Scegli un'immagine</label>
                        <input class="form-control" type="file" id="memberImage" accept="image/*">
                    </div>

                    <!-- SUBMIT -->
                    <button type="submit" id="sub" class="btn btn-primary w-100 py-2">
                        Unisciti al Team
                    </button>

                </form>
            </div>
        </div>
    </div>
    <script src="assets/script/script.js"></script>
</body>

</html>
